run:
  run_id: demo
  output_root: runs
  target_count: 3
  max_rounds: 1
  generation_oversample: 1.0
  concurrency: 1
  seed: 7
  resume: false
  force: false

paths:
  seeds: examples/seeds/small_seed.jsonl
  synthetic_pool: []

llm:
  base_url: http://localhost:8000/v1
  model: your-model-name
  api_key_env: LLM_API_KEY
  temperature: 0.7
  top_p: 0.9
  max_tokens: 2048
  timeout_seconds: 120
  disable_proxy: false

cache:
  enabled: true
  dir: cache/chat

quality:
  problem_similarity_threshold: 0.9
  compare_to_seeds: true
  compare_to_run: true

parent_pool:
  parent_pool_mode: hybrid
  synthetic_parent_share: 0.5
  parent_match_top_k: 8
  parent_usage_penalty: 0.25
  parent_exact_match_probability: 0.5

prompts:
  generate_synthetic_ir: prompts/generate_synthetic_ir.txt
  render_problem: prompts/render_problem.txt
  render_answer: prompts/render_answer.txt

problem_modes: [DP, DT]
domains: [logistics, production, energy, generic]
structures: [transportation, production_planning, capacity_planning, generic_lp_mip]
difficulties: [small, medium]
